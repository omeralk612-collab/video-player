<title>مشغّل الفيديو</title>

<body>
<script>
// Inline SW registration using blob
const swCode = `
const CACHE = 'vp-v2';
const ASSETS = ['/'];
self.addEventListener('install', e => { e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS))); self.skipWaiting(); });
self.addEventListener('activate', e => { e.waitUntil(caches.keys().then(ks => Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k))))); self.clients.claim(); });
self.addEventListener('fetch', e => { e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(() => new Response('offline')))); });
`;
const blob = new Blob([swCode], {type: 'application/javascript'});
const swUrl = URL.createObjectURL(blob);
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register(swUrl).then(() => console.log('SW OK'));
}
</script>
